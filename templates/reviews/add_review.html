<!DOCTYPE html>
<html>
<head>
    <title>Add Reviews</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f6fa;
            padding: 20px;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }

        textarea {
            font-family: monospace;
        }

        .hint-box {
            background: #eef2ff;
            border-left: 4px solid #4f46e5;
            padding: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="d-flex justify-content-between mb-3">
        <h2>➕ Add Reviews (Bulk)</h2>

        <div>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary me-2">
                Dashboard
            </a>

            <a href="{% url 'review_history' %}" class="btn btn-dark">
                History
            </a>
        </div>
    </div>

    <div class="card">
        <div class="card-body">

            <form method="post" id="reviewForm">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Review Date</label>
                    <input type="date" name="review_date"
                           id="review_date"
                           class="form-control"
                           required>
                </div>

                <div class="hint-box mb-3">
                    Paste data in format:<br>
                    <b>Advisor | Intern | Week | Reviewer</b><br><br>

                    Example:<br>
                    Silpa | Arun K | Dotnet W1 | Arun-K-DotNet-EXT
                </div>

                <div class="mb-2 d-flex justify-content-between">
                    <label class="form-label">Bulk Data</label>
                    <span id="rowCount" class="text-muted">
                        0 rows detected
                    </span>
                </div>

                <textarea name="bulk_data"
                          id="bulk_data"
                          rows="14"
                          class="form-control"
                          placeholder="Paste rows here..."></textarea>

                <div class="mt-3 d-flex gap-2">

                    <button type="submit" class="btn btn-success">
                        Save All Reviews
                    </button>

                    <button type="button"
                            class="btn btn-outline-danger"
                            onclick="clearData()">
                        Clear
                    </button>

                </div>

            </form>

        </div>
    </div>

</div>

<script>
const textarea = document.getElementById("bulk_data");
const dateInput = document.getElementById("review_date");
const rowCounter = document.getElementById("rowCount");

/* ---------- Count rows ---------- */
textarea.addEventListener("input", () => {
    let rows = textarea.value
        .split("\n")
        .filter(line => line.trim() !== "").length;

    rowCounter.innerText = rows + " rows detected";
});

/* ---------- Auto-save to localStorage ---------- */
textarea.addEventListener("input", saveState);
dateInput.addEventListener("change", saveState);

function saveState() {
    localStorage.setItem("bulkReviewData", textarea.value);
    localStorage.setItem("bulkReviewDate", dateInput.value);
}

/* ---------- Restore saved state ---------- */
window.onload = () => {
    textarea.value = localStorage.getItem("bulkReviewData") || "";
    dateInput.value = localStorage.getItem("bulkReviewDate") || "";

    textarea.dispatchEvent(new Event("input"));
};

/* ---------- Clear ---------- */
function clearData() {
    textarea.value = "";
    localStorage.removeItem("bulkReviewData");
    textarea.dispatchEvent(new Event("input"));
}
</script>

</body>
</html>
