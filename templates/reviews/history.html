<!DOCTYPE html>
<html>
<head>
    <title>Review History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f6fa;
            padding: 20px;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }

        .status-select {
            min-width: 130px;
        }
    </style>
</head>

<body>

<div class="container-fluid">

    <!-- Header -->
    <div class="d-flex justify-content-between mb-3">
        <h2>📜 Review History</h2>

        <div>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary me-2">
                Dashboard
            </a>
            <a href="{% url 'add_review' %}" class="btn btn-success">
                Add Reviews
            </a>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">

            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Date</th>
                        <th>Advisor</th>
                        <th>Reviewer</th>
                        <th>Intern</th>
                        <th>Week</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                {% for r in reviews %}
                    <tr>
                        <td>{{ r.review_date }}</td>
                        <td>{{ r.advisor.name }}</td>
                        <td>{{ r.reviewer.name }}</td>
                        <td>{{ r.intern }}</td>
                        <td>{{ r.current_week }}</td>

                        <td>
                            <select class="form-select status-select"
                                    onchange="updateStatus({{ r.id }}, this)">
                                <option value="pending"
                                  {% if r.status == "pending" %}selected{% endif %}>
                                  Pending
                                </option>

                                <option value="not_done"
                                  {% if r.status == "not_done" %}selected{% endif %}>
                                  Not Done
                                </option>

                                <option value="done"
                                  {% if r.status == "done" %}selected{% endif %}>
                                  Done
                                </option>
                            </select>
                        </td>
                    </tr>
                {% endfor %}
                </tbody>

            </table>

        </div>
    </div>

</div>

<script>
/* ---------- Status update ---------- */
function updateStatus(id, element) {
    fetch("/reviews/update-status/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({
            id: id,
            status: element.value
        })
    });
}

/* ---------- Save scroll position ---------- */
window.onbeforeunload = function () {
    localStorage.setItem("historyScroll", window.scrollY);
};

window.onload = function () {
    const pos = localStorage.getItem("historyScroll");
    if (pos) window.scrollTo(0, pos);
};
</script>

</body>
</html>
